name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          binary=ec2tail
          if [ "$GOOS" = "windows" ]; then binary=ec2tail.exe; fi
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$binary" .

          archive=ec2tail_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}
          if [ "$GOOS" = "windows" ]; then
            zip "${archive}.zip" "$binary" README.md LICENSE
          else
            tar -czf "${archive}.tar.gz" "$binary" README.md LICENSE
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ec2tail_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            ec2tail_*.tar.gz
            ec2tail_*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum ec2tail_* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
